<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Login | The Faithful Bride Assembly</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <main class="login-container">
        <div class="login-card">
            <h2><i class="fas fa-lock"></i> Admin Login</h2>
            <p>Restricted access for church leadership only.</p>
            <form id="login-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="admin@faithchurch.org" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-primary w-100">Sign In</button>
            </form>
            <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Return to Home</a>
        </div>
    </main>
    <script type="module" src="js/login.js"></script>
</body>
</html>

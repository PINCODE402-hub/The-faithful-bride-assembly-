<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Faithful Bride Assembly | Upcoming Events</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="nav-logo">The Faithful Bride Assembly</div>
        
        <div class="nav-controls">
            <button class="btn-toggle" id="theme-toggle"><i class="fas fa-moon"></i></button>
            <button class="admin-lock-btn" id="admin-gate-toggle" title="Admin Portal"><i class="fas fa-lock"></i></button>
            <button class="hamburger" id="hamburger">
                <i class="fas fa-bars"></i>
            </button>
        </div>

        <ul class="nav-links" id="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="sermons.html">Sermons</a></li>
            <li><a href="events.html">Events</a></li>
            <li><a href="community.html">Community</a></li>
        </ul>
    </nav>

    <!-- Header banner -->
    <header class="page-header">
        <h1>Church Calendar & Events</h1>
        <p>Stay connected with everything happening in our community</p>
    </header>

    <main class="container">
        <!-- Main Grid for Calendar Events -->
        <section id="events-grid" class="events-grid">
            <!-- Loading indicator / Dynamic event cards go here -->
            <p class="loading-text">Loading upcoming events...</p>
        </section>

        <hr class="section-divider">

        <!-- Admin Portal: Add Event Section -->
        <section class="admin-event-section admin-only">
            <h2><i class="fas fa-lock"></i> Management Dashboard (Add Event)</h2>
            <form id="admin-event-form" class="admin-form">
                <div class="form-group">
                    <label for="event-title">Event Title</label>
                    <input type="text" id="event-title" placeholder="e.g., Youth Night Revival" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="event-date">Date</label>
                        <input type="date" id="event-date" required>
                    </div>
                    <div class="form-group">
                        <label for="event-time">Time</label>
                        <input type="time" id="event-time" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="event-location">Location</label>
                    <input type="text" id="event-location" placeholder="e.g., Main Sanctuary or Zoom" required>
                </div>
                <div class="form-group">
                    <label for="event-desc">Description</label>
                    <textarea id="event-desc" placeholder="Provide details about the event..." required></textarea>
                </div>
                <button type="submit" class="btn-primary">Publish Event</button>
                <button id="cleanup-events-btn" class="btn-danger">Clear All Past Events</button>
            </form>
        </section>
    </main>
    <div id="notification-toast" class="toast hidden">
        <span id="toast-message">Success!</span>
    </div>
    <!-- Include JavaScript Modules -->
    <script type="module" src="js/events.js"></script>
</body>
</html>
